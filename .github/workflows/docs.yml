name: docs

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run doc checks
        run: |
          chmod +x scripts/*.sh
          bash scripts/check_docs.sh

      - name: Generate AI report
        run: |
          python3 scripts/ai_doc_review.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site
